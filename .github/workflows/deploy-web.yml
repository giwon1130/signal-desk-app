name: Deploy Web (GitHub Pages)

# 리딩 등 PC 작성용 웹 앱 — Expo 웹 export 를 GitHub Pages 로 무료 호스팅.
# 최초 1회: GitHub 레포 Settings → Pages → Source 를 "GitHub Actions" 로 설정해야 함.
# 배포 주소: https://giwon1130.github.io/signal-desk-app/

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'App.tsx'
      - 'index.ts'
      - 'app.json'
      - 'package.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 — 진행 중이면 최신으로 대체.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Expo web export
        env:
          EXPO_PUBLIC_API_BASE_URL: https://signal-desk-api-production.up.railway.app
        run: npx expo export --platform web --output-dir dist

      - name: SPA fallback + disable Jekyll
        # _expo 폴더(언더스코어)가 Jekyll 에 삭제되지 않도록 .nojekyll, SPA 라우팅용 404.html.
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
