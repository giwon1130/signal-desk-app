name: Release iOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'ios-v*'

permissions:
  contents: read

jobs:
  release:
    name: Build and upload iOS
    runs-on: ubuntu-latest
    environment: app-store
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run check:types

      - name: EAS production build and App Store Connect upload
        run: npx eas build --platform ios --profile production --auto-submit --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
