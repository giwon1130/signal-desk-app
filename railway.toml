# Railway 웹 서비스 설정. 백엔드 `signal-desk-api` 와 같은 프로젝트에
# 별도 서비스로 생성하고 이 파일을 config 로 지정해서 사용.
#   railway link  (signal-desk-and-otaku-feed / production / signal-desk-web)
#   railway up --service signal-desk-web

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.web"

[deploy]
startCommand = "sh -c 'serve -s dist -l tcp://0.0.0.0:${PORT:-3000}'"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
